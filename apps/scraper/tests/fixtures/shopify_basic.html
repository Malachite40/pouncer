<html>
<head>
    <title>Awesome T-Shirt - My Store</title>
    <meta property="og:title" content="Awesome T-Shirt">
    <meta property="product:price:amount" content="24.99">
    <meta property="product:price:currency" content="USD">
    <script type="application/ld+json">
    {
        "@type": "Product",
        "name": "Awesome T-Shirt",
        "offers": {
            "@type": "Offer",
            "price": "24.99",
            "priceCurrency": "USD",
            "availability": "https://schema.org/InStock"
        }
    }
    </script>
</head>
<body>
    <h1>Awesome T-Shirt</h1>
    <div class="product__price" data-product-price="2499">
        <span class="price__current">$24.99</span>
    </div>
    <div class="product-availability">In Stock</div>
    <button>Add to Cart</button>
</body>
</html>
