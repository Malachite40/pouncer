services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pounce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-pounce}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pounce} -d ${POSTGRES_DB:-pounce}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    restart: unless-stopped
    shm_size: '2gb'
    ports:
      - "8001:8001"
    environment:
      SCRAPE_WORKERS: "${SCRAPE_WORKERS:-1}"
      SCRAPE_QUEUE_SIZE: "${SCRAPE_QUEUE_SIZE:-16}"
      SCRAPE_ENQUEUE_WAIT_MS: "${SCRAPE_ENQUEUE_WAIT_MS:-3000}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_BETTER_AUTH_URL: ${NEXT_PUBLIC_BETTER_AUTH_URL:-${BETTER_AUTH_URL}}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-pounce}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-pounce}"
      REDIS_URL: "redis://redis:6379"
      SCRAPER_URL: "http://scraper:8001"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:?Set BETTER_AUTH_URL in .env}"
      NEXT_PUBLIC_BETTER_AUTH_URL: "${NEXT_PUBLIC_BETTER_AUTH_URL:-${BETTER_AUTH_URL}}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      scraper:
        condition: service_healthy

  cron:
    build:
      context: .
      dockerfile: apps/cron/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-pounce}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-pounce}"
      REDIS_URL: "redis://redis:6379"
      WATCH_CHECK_LEASE_MS: "${WATCH_CHECK_LEASE_MS:-120000}"
      WATCH_SCHEDULER_BATCH_SIZE: "${WATCH_SCHEDULER_BATCH_SIZE:-25}"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue:
    build:
      context: .
      dockerfile: apps/queue/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-pounce}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-pounce}"
      REDIS_URL: "redis://redis:6379"
      SCRAPER_URL: "http://scraper:8001"
      QUEUE_WORKER_CONCURRENCY: "${QUEUE_WORKER_CONCURRENCY:-1}"
      SCRAPER_CONCURRENCY_LIMIT: "${SCRAPER_CONCURRENCY_LIMIT:-1}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      WATCH_CHECK_LEASE_MS: "${WATCH_CHECK_LEASE_MS:-120000}"
      WATCH_CHECK_RETRY_BACKOFF_MS: "${WATCH_CHECK_RETRY_BACKOFF_MS:-60000}"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      scraper:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
